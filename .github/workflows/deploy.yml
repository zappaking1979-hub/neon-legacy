name: Deploy

on:
  push:
    branches: [main]

env:
  DEPLOY_HOST: 161.153.38.182
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /opt/neon-legacy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -count=1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main
            docker compose build app
            docker compose up -d
            docker image prune -f
            echo "Deploy complete"
          EOF
