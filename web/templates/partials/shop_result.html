{{define "partials/shop_result.html"}}
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 mt-4">
    {{if .Success}}
    <div class="bg-green-900/30 border border-green-800 text-green-300 px-4 py-3 rounded-lg mb-4">
        <strong>Success!</strong> {{.Message}}
    </div>
    {{else}}
    <div class="bg-red-900/30 border border-red-800 text-red-300 px-4 py-3 rounded-lg">
        <strong>Failed.</strong> {{.Message}}
    </div>
    {{end}}

    <div class="mt-4 pt-4 border-t border-gray-800 text-sm">
        <div class="flex justify-between">
            <span class="text-gray-400">Cash</span>
            <span class="font-mono text-yellow-400">${{printf "%d" .Player.Cash}}</span>
        </div>
    </div>
</div>
{{end}}
