{{template "partials/head.html" .}}
{{template "partials/nav.html" .}}

<main class="max-w-7xl mx-auto px-4 py-6">
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-900 rounded-xl p-8 border border-gray-800">
        <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>

        {{if .error}}
        <div class="bg-red-900/50 border border-red-800 text-red-300 px-4 py-3 rounded-lg mb-6 text-sm">
            {{.error}}
        </div>
        {{end}}

        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition"
                    placeholder="you@example.com">
            </div>
            <div>
                <label for="username" class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" id="username" required minlength="3" maxlength="20"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition"
                    placeholder="3-20 characters, letters and numbers">
            </div>
            <div>
                <label for="password" class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" id="password" required minlength="8"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition"
                    placeholder="At least 8 characters">
            </div>
            <div>
                <label for="gender" class="block text-sm text-gray-400 mb-1">Gender</label>
                <select name="gender" id="gender" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <button type="submit"
                class="w-full bg-cyan-600 hover:bg-cyan-500 font-semibold py-2.5 rounded-lg transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account?
            <a href="/login" class="text-cyan-400 hover:text-cyan-300">Sign in</a>
        </p>
    </div>
</div>
</main>

{{template "partials/footer.html" .}}
